let gameWords = [];
let current = 0;
let score = 0;
let mistakes = 0;
let wrongAnswers = [];

function shuffle(array){
  return array.sort(() => Math.random() - 0.5);
}

function startGame(){
  gameWords = shuffle([...words]).slice(0,15);
  current = 0;
  score = 0;
  mistakes = 0;
  wrongAnswers = [];
  document.getElementById("result").innerHTML = "";
  showQuestion();
}

function showQuestion(){
  if(current >= gameWords.length){
    endGame(false);
    return;
  }

  const q = gameWords[current];
  document.getElementById("info").innerHTML =
    `Question ${current+1}/15 | Score: ${score} | Mistakes: ${mistakes}/3`;

  document.getElementById("meaning").innerHTML = "📖 " + q.meaning;

  let options = [q.word];
  let otherWords = shuffle(words.filter(w => w.word !== q.word));

  while(options.length < 4){
    options.push(otherWords.pop().word);
  }

  options = shuffle(options);

  let html = "";
  options.forEach(option => {
    html += `<button class="choice" onclick="checkAnswer(this,'${option}')">${option}</button>`;
  });

  document.getElementById("choices").innerHTML = html;
}

function checkAnswer(button, selected){
  const correct = gameWords[current].word;
  const allButtons = document.querySelectorAll(".choice");

  allButtons.forEach(btn => btn.disabled = true);

  if(selected === correct){
    button.classList.add("correct");
    score++;
  } else {
    button.classList.add("wrong");
    mistakes++;
    wrongAnswers.push({
      meaning: gameWords[current].meaning,
      correct: correct,
      selected: selected
    });

    allButtons.forEach(btn => {
      if(btn.innerText === correct){
        btn.classList.add("correct");
      }
    });
  }

  setTimeout(() => {
    if(mistakes > 3){
      endGame(true);
    } else {
      current++;
      showQuestion();
    }
  }, 900);
}

function endGame(gameOver){
  document.getElementById("choices").innerHTML = "";
  document.getElementById("meaning").innerHTML = gameOver ? "💥 Game Over!" : "🎉 Great Job!";
  document.getElementById("info").innerHTML = `Final Score: ${score}/15 | Mistakes: ${mistakes}`;

  let review = "<div class='review'><h2>Wrong Answer Review</h2>";

  if(wrongAnswers.length === 0){
    review += "<p>Excellent! You made no mistakes! 🌟</p>";
  } else {
    wrongAnswers.forEach((item, index) => {
      review += `
      <p>
      <b>${index+1}. Meaning:</b> ${item.meaning}<br>
      ❌ Your answer: ${item.selected}<br>
      ✅ Correct answer: ${item.correct}
      </p><hr>`;
    });
  }

  review += "</div>";
  document.getElementById("result").innerHTML = review;
}
</script>
