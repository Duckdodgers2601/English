let questions = [];
let current = 0;
let score = 0;
let mistakes = 0;
let wrongAnswers = [];
const MAX_QUESTIONS = 15;
const MAX_MISTAKES = 3;

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function startGame() {
  questions = shuffle([...vocabulary]).slice(0, Math.min(MAX_QUESTIONS, vocabulary.length));
  current = 0;
  score = 0;
  mistakes = 0;
  wrongAnswers = [];

  document.getElementById("score").innerText = "Score: 0";
  document.getElementById("lives").innerText = "Lives: ❤️❤️❤️";
  document.getElementById("review").innerHTML = "";

  showQuestion();
}

function showQuestion() {
  if (current >= questions.length) {
    finishGame(false);
    return;
  }

  const item = questions[current];
  const sentence = shuffle([...item.sentences])[0];
  item.currentSentence = sentence;

  document.getElementById("progress").innerText =
    "Question " + (current + 1) + " / " + questions.length;

  document.getElementById("question").innerText = sentence;

  let options = [item.word];

  const wrongOptions = shuffle(
    vocabulary
      .map(v => v.word)
      .filter(word => word !== item.word)
  );

  while (options.length < 4) {
    options.push(wrongOptions.pop());
  }

  options = shuffle(options);

  let html = "";
  options.forEach(option => {
    html += `<button class="choice" onclick="checkAnswer(this, '${option}')">${option}</button>`;
  });

  document.getElementById("choices").innerHTML = html;
}

function checkAnswer(button, selected) {
  const correct = questions[current].word;
  const buttons = document.querySelectorAll(".choice");

  buttons.forEach(btn => btn.disabled = true);

  if (selected === correct) {
    button.classList.add("correct");
    score++;
  } else {
    button.classList.add("wrong");
    mistakes++;

    wrongAnswers.push({
      sentence: questions[current].currentSentence,
      correct: correct,
      selected: selected,
      complete: questions[current].currentSentence.replace("_____", correct)
    });

    buttons.forEach(btn => {
      if (btn.innerText === correct) {
        btn.classList.add("correct");
      }
    });
  }

  updateScore();

  setTimeout(() => {
    if (mistakes > MAX_MISTAKES) {
      finishGame(true);
    } else {
      current++;
      showQuestion();
    }
  }, 900);
}

function updateScore() {
  document.getElementById("score").innerText = "Score: " + score;

  const livesLeft = Math.max(0, MAX_MISTAKES + 1 - mistakes);
  document.getElementById("lives").innerText =
    "Lives: " + "❤️".repeat(livesLeft) + "🤍".repeat(4 - livesLeft);
}

function finishGame(gameOver) {
  document.getElementById("choices").innerHTML = "";

  document.getElementById("question").innerHTML = gameOver
    ? "💥 Game Over!"
    : "🎉 Great job! You finished!";

  document.getElementById("progress").innerText =
    "Final Score: " + score + " / " + questions.length;

  showReview();
}

function showReview() {
  let html = "<div class='review'><h2>📖 Wrong Answer Review</h2>";

  if (wrongAnswers.length === 0) {
    html += "<p>Excellent! You made no mistakes! 🌟</p>";
  } else {
    wrongAnswers.forEach((item, index) => {
      html += `
        <p>
          <b>${index + 1}. Sentence:</b> ${item.sentence}<br>
          ❌ Your answer: ${item.selected}<br>
          ✅ Correct answer: ${item.correct}<br>
          ✔ Complete sentence: ${item.complete}
        </p>
        <hr>
      `;
    });
  }

  html += "</div>";
  document.getElementById("review").innerHTML = html;
}
</script>
